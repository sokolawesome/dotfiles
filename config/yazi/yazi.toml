[mgr]
	linemode       = "mtime"
	mouse_events   = ["click", "scroll"]
	ratio          = [0, 1, 1]
	scrolloff      = 5
	show_hidden    = true
	show_symlink   = true
	sort_by        = "natural"
	sort_dir_first = true
	sort_reverse   = false
	sort_sensitive = false
	sort_translit  = true
	title_format   = "Yazi: {cwd}"

[preview]
	cache_dir       = ""
	image_delay     = 100
	image_filter    = "nearest"
	image_quality   = 60
	max_height      = 1080
	max_width       = 1920
	tab_size        = 4
	ueberzug_offset = [0, 0, 0, 0]
	ueberzug_scale  = 1
	wrap            = "yes"

[opener]
	download = [
		{ run = "ya emit download %S", desc = "Download" },
		{ run = "ya emit download --open %S", desc = "Download and open" },
	]
	edit = [
		{ run = "${EDITOR} %s", desc = "Edit via micro", for = "unix", block = true },
		{ run = 'code "$@"', desc = "Edit via VSCode", for = "unix", block = true },
	]
	extract = [{ run = "ya pub extract --list %s", desc = "Extract here" }]
	open = [{ run = "open %s", desc = "Open", for = "macos" }, { run = "xdg-open %s1", desc = "Open", for = "linux" }]
	play = [
		{ run = "open %s", desc = "Play", for = "macos" },
		{ run = 'mpv --force-window "$@"', desc = "Play", for = "linux" },
	]
	reveal = [
		{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
		{ run = "open -R %s1", desc = "Reveal", for = "macos" },
		{ run = "xdg-open %d1", desc = "Reveal", for = "linux" },
	]

[open]
	rules = [
		# Folder
		{ url = "*/", use = [
			"open",
		] },
		# Text
		{ mime = "text/*", use = [
			"edit",
			"reveal",
		] },
		# Image
		{ mime = "image/*", use = [
			"open",
			"reveal",
		] },
		# Media
		{ mime = "{audio,video}/*", use = [
			"play",
			"reveal",
		] },
		# Archive
		{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
			"extract",
			"reveal",
		] },
		# JSON
		{ mime = "*/javascript", use = [
			"edit",
			"reveal",
		] },
		{ mime = "application/{json,ndjson}", use = [
			"edit",
			"reveal",
		] },
		# Empty file
		{ mime = "inode/empty", use = [
			"edit",
			"reveal",
		] },
		# Virtual file system
		{ mime = "vfs/{absent,stale}", use = "download" },
		# Fallback
		{ url = "*", use = [
			"open",
			"reveal",
		] },
	]

[tasks]
	bizarre_retry    = 3
	fetch_workers    = 5
	file_workers     = 3
	image_alloc      = 536870912      # 512MB
	image_bound      = [10000, 10000]
	plugin_workers   = 5
	preload_workers  = 2
	process_workers  = 5
	suppress_preload = false

[plugin]
	fetchers = [
		# Mimetype
		{ url = "*/", run = "mime.dir", prio = "high", group = "mime" },
		{ url = "local://*", run = "mime.local", prio = "high", group = "mime" },
		{ url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
	]
	preloaders = [
		# Image
		{ mime = "image/*", run = "image" },
		{ mime = "image/svg+xml", run = "svg" },
		{ mime = "image/{avif,hei?,jxl}", run = "magick" },
		# PDF
		{ mime = "application/pdf", run = "pdf" },
		# Font
		{ mime = "application/ms-opentype", run = "font" },
		{ mime = "font/*", run = "font" },
	]
	previewers = [
		{ url = "*/", run = "folder" },
		# Code
		{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
		{ mime = "text/*", run = "code" },
		# JSON
		{ mime = "application/{json,ndjson}", run = "json" },
		# Image
		{ mime = "image/*", run = "image" },
		{ mime = "image/svg+xml", run = "svg" },
		{ mime = "image/{avif,hei?,jxl}", run = "magick" },
		# PDF
		{ mime = "application/pdf", run = "pdf" },
		# Archive
		{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
		{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
		{ url = "*.{AppImage,appimage}", run = "archive" },
		# Virtual Disk / Disk Image
		{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
		{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
		{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
		# Font
		{ mime = "application/ms-opentype", run = "font" },
		{ mime = "font/*", run = "font" },
		# Empty file
		{ mime = "inode/empty", run = "empty" },
		# Virtual file system
		{ mime = "vfs/*", run = "vfs" },
		# Error
		{ mime = "null/*", run = "null" },
		# Fallback
		{ url = "*", run = "file" },
	]
	spotters = [
		{ url = "*/", run = "folder" },
		# Code
		{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
		{ mime = "text/*", run = "code" },
		# Image
		{ mime = "image/*", run = "image" },
		{ mime = "image/svg+xml", run = "svg" },
		{ mime = "image/{avif,hei?,jxl}", run = "magick" },
		# Video
		{ mime = "video/*", run = "video" },
		# Virtual file system
		{ mime = "vfs/*", run = "vfs" },
		# Error
		{ mime = "null/*", run = "null" },
		# Fallback
		{ url = "*", run = "file" },
	]

[input]
	cursor_blink = false

	# cd
	cd_offset = [0, 0, 50, 3]
	cd_origin = "center"
	cd_title  = "Change directory:"

	# create
	create_offset = [0, 0, 50, 3]
	create_origin = "center"
	create_title  = ["Create (dir):", "Create:"]

	# rename
	rename_offset = [0, 0, 50, 3]
	rename_origin = "center"
	rename_title  = "Rename:"

	# filter
	filter_offset = [0, 0, 50, 3]
	filter_origin = "center"
	filter_title  = "Filter:"

	# find
	find_offset = [0, 0, 50, 3]
	find_origin = "center"
	find_title  = ["Find next:", "Find previous:"]

	# search
	search_offset = [0, 0, 50, 3]
	search_origin = "center"
	search_title  = "Search via {n}:"

	# shell
	shell_offset = [0, 0, 50, 3]
	shell_origin = "center"
	shell_title  = ["Shell (block):", "Shell:"]

[confirm]
	# trash
	trash_offset = [0, 0, 70, 20]
	trash_origin = "center"
	trash_title  = "Trash {n} selected file{s}?"

	# delete
	delete_offset = [0, 0, 70, 20]
	delete_origin = "center"
	delete_title  = "Permanently delete {n} selected file{s}?"

	# overwrite
	overwrite_body   = "Will overwrite the following file:"
	overwrite_offset = [0, 0, 50, 15]
	overwrite_origin = "center"
	overwrite_title  = "Overwrite file?"

	# quit
	quit_body   = "There are unfinished tasks, quit anyway?\n(Open task manager with default key 'w')"
	quit_offset = [0, 0, 50, 15]
	quit_origin = "center"
	quit_title  = "Quit?"

[pick]
	open_offset = [0, 0, 50, 7]
	open_origin = "hovered"
	open_title  = "Open with:"

[which]
	sort_by        = "none"
	sort_reverse   = false
	sort_sensitive = false
	sort_translit  = false

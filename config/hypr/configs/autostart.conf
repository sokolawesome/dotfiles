exec-once = ~/bin/hyprland/xdg.sh

exec-once = gsettings set org.gnome.desktop.interface font-name "Noto Sans 11"
exec-once = gsettings set org.gnome.desktop.interface document-font-name "Noto Sans 11"
exec-once = gsettings set org.gnome.desktop.interface monospace-font-name "IosevkaTerm Nerd Font Mono 11"
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# exec-once = waybar
exec-once = qs -c noctalia-shell --no-duplicate
exec-once = hypridle
exec-once = nm-applet
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store -max-items 1000
exec-once = wl-paste --type image --watch cliphist store -max-items 1000
exec-once = wl-clip-persist --clipboard regular

exec-once = /usr/lib/polkit-kde-authentication-agent-1
